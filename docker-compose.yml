version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: surfsec
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SHODAN_API_KEY=${SHODAN_API_KEY}
      - HUNTER_API_KEY=${HUNTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - MAX_CONCURRENT_DOMAINS=${MAX_CONCURRENT_DOMAINS:-10}
      - MOCK_ENVIRONMENT=${MOCK_ENVIRONMENT:-false}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/surfsec?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
